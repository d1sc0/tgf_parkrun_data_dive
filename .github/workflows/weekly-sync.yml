name: Weekly Parkrun Sync

on:
  schedule:
    # Every Monday at 05:00 UTC
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GOOGLE_CREDENTIALS_PATH: ./service-account-key.json

      BIGQUERY_DATASET_ID: parkrun_data
      BIGQUERY_RESULTS_TABLE: results
      BIGQUERY_VOLUNTEERS_TABLE: volunteers
      BIGQUERY_JUNIOR_RESULTS_TABLE: junior_results
      BIGQUERY_JUNIOR_VOLUNTEERS_TABLE: junior_volunteers

      PARKRUN_CLIENT_ID: ${{ secrets.PARKRUN_CLIENT_ID }}
      PARKRUN_CLIENT_SECRET: ${{ secrets.PARKRUN_CLIENT_SECRET }}

      PARKRUN_EVENT_ID: ${{ secrets.PARKRUN_EVENT_ID }}
      PARKRUN_USERNAME: ${{ secrets.PARKRUN_USERNAME }}
      PARKRUN_PASSWORD: ${{ secrets.PARKRUN_PASSWORD }}

      JUNIOR_EVENT_ID: ${{ secrets.JUNIOR_EVENT_ID }}
      JUNIOR_USERNAME: ${{ secrets.JUNIOR_USERNAME }}
      JUNIOR_PASSWORD: ${{ secrets.JUNIOR_PASSWORD }}

      # Latest-only sync behavior
      RUN_JUNIOR: 'false'
      FETCH_LATEST_ONLY: 'true'
      TARGET_EVENT_NUMBER: ''
      SCRAPE_ALL_EVENTS: 'false'
      SCRAPE_MAX_EVENTS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        shell: bash
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          set -euo pipefail
          required=(
            GCP_PROJECT_ID
            GCP_SERVICE_ACCOUNT_KEY
            PARKRUN_CLIENT_ID
            PARKRUN_CLIENT_SECRET
            PARKRUN_EVENT_ID
            PARKRUN_USERNAME
            PARKRUN_PASSWORD
          )

          for key in "${required[@]}"; do
            value="${!key:-}"
            if [[ -z "$value" ]]; then
              echo "Missing required secret/env: $key"
              exit 1
            fi
          done

          echo "Required secrets/env vars are present."

      - name: Write GCP service account key
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          if [[ -z "$GCP_SERVICE_ACCOUNT_KEY" ]]; then
            echo "Missing required secret/env: GCP_SERVICE_ACCOUNT_KEY"
            exit 1
          fi
          cat > service-account-key.json <<'JSON'
          ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          JSON
          chmod 600 service-account-key.json

      - name: Validate service account key JSON and project alignment
        run: |
          node - <<'NODE'
          const fs = require('fs');

          const path = 'service-account-key.json';
          const projectId = process.env.GCP_PROJECT_ID;
          let parsed;

          try {
            parsed = JSON.parse(fs.readFileSync(path, 'utf8'));
          } catch (err) {
            console.error('service-account-key.json is not valid JSON.');
            process.exit(1);
          }

          const requiredFields = ['type', 'project_id', 'client_email', 'private_key'];
          const missing = requiredFields.filter(k => !parsed[k]);
          if (missing.length > 0) {
            console.error(`Service account key JSON missing fields: ${missing.join(', ')}`);
            process.exit(1);
          }

          if (parsed.type !== 'service_account') {
            console.error(`Expected type=service_account but got: ${parsed.type}`);
            process.exit(1);
          }

          if (projectId && parsed.project_id !== projectId) {
            console.error(
              `GCP_PROJECT_ID (${projectId}) does not match key project_id (${parsed.project_id}).`,
            );
            process.exit(1);
          }

          console.log('Service account key JSON looks valid and project IDs are aligned.');
          NODE

      - name: BigQuery auth preflight
        run: |
          node - <<'NODE'
          const path = require('path');
          const { BigQuery } = require('@google-cloud/bigquery');

          const projectId = process.env.GCP_PROJECT_ID;
          const keyFilename = path.resolve(process.env.GOOGLE_CREDENTIALS_PATH);
          const datasetId = process.env.BIGQUERY_DATASET_ID || 'parkrun_data';

          (async () => {
            const bq = new BigQuery({ projectId, keyFilename });

            // Fails if key is invalid or service account lacks BigQuery jobs permission.
            await bq.query({ query: 'SELECT 1 AS ok', useLegacySql: false });

            // Optional but useful early signal for dataset-level IAM issues.
            const [exists] = await bq.dataset(datasetId).exists();
            console.log(`BigQuery auth preflight passed (dataset ${datasetId} exists: ${exists}).`);
          })().catch(err => {
            const msg = err && err.message ? err.message : String(err);
            console.error(`BigQuery auth preflight failed: ${msg}`);
            process.exit(1);
          });
          NODE

      - name: Parkrun auth preflight
        run: |
          node - <<'NODE'
          const axios = require('axios');
          const qs = require('querystring');

          const base = 'https://api.parkrun.com';
          const body = qs.stringify({
            username: process.env.PARKRUN_USERNAME,
            password: process.env.PARKRUN_PASSWORD,
            scope: 'app',
            grant_type: 'password',
          });

          (async () => {
            const res = await axios.post(`${base}/user_auth.php`, body, {
              headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'User-Agent': 'parkrun/1.2.7 CFNetwork/1121.2.2 Darwin/19.3.0',
                'X-Powered-By': 'tgf-parkrun-processor-preflight',
              },
              auth: {
                username: process.env.PARKRUN_CLIENT_ID,
                password: process.env.PARKRUN_CLIENT_SECRET,
              },
              timeout: 30000,
            });

            if (!res.data || !res.data.access_token) {
              throw new Error('No access_token returned by Parkrun auth endpoint.');
            }

            console.log('Parkrun auth preflight passed.');
          })().catch(err => {
            const status = err?.response?.status;
            if (status === 403) {
              console.error(
                'Parkrun auth preflight failed with HTTP 403. Check PARKRUN_* secrets and consider possible CI runner IP blocking.',
              );
            } else {
              console.error(`Parkrun auth preflight failed: ${err.message || err}`);
            }
            process.exit(1);
          });
          NODE

      - name: Ensure BigQuery dataset/tables exist
        run: npm run setup:bq

      - name: Sync event coordinates
        run: npm run sync:coordinates

      - name: Run parkrun sync (sync_parkrun.js via npm run dev)
        run: npm run dev

      - name: Sync latest weather snapshot
        run: npm run sync:weather:latest
